<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>browse — songfess</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #05050f; --surface: #0c0c1e; --surface2: #10102a;
    --border: rgba(255,255,255,0.07); --text: #e8e4f0;
    --muted: rgba(232,228,240,0.4); --accent: #7c6aff; --accent2: #c084fc;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', serif; min-height: 100vh; overflow-x: hidden; max-width: 100vw; }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.85); animation: twinkle var(--dur) ease-in-out infinite alternate; opacity: var(--op); }
  @keyframes twinkle { from { opacity: var(--op); } to { opacity: calc(var(--op) * 0.2); transform: scale(0.6); } }
  .nebula { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .nebula-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%); top: -100px; right: -200px; animation: drift 20s ease-in-out infinite alternate; }
  .nebula-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(192,132,252,0.08) 0%, transparent 70%); bottom: 100px; left: -150px; animation: drift 25s ease-in-out infinite alternate-reverse; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(5,5,15,0.9) 0%, transparent 100%); backdrop-filter: blur(2px); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.05em; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .wrapper { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 140px 24px 100px; }
  .page-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s; }
  .page-title { font-size: clamp(36px, 6vw, 56px); font-weight: 300; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 8px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s; }
  .page-title em { font-style: italic; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .page-sub { font-size: 17px; font-weight: 300; font-style: italic; color: var(--muted); margin-bottom: 48px; line-height: 1.6; opacity: 0; animation: fadeUp 0.6s ease forwards 0.3s; }

  /* Search bar */
  .search-row { display: flex; gap: 10px; margin-bottom: 48px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.4s; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; padding: 14px 18px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: rgba(124,106,255,0.5); }
  .search-input::placeholder { color: var(--muted); font-style: italic; }
  .search-btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 0 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 2px; color: #fff; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; flex-shrink: 0; }
  .search-btn:hover { opacity: 0.85; }

  /* States */
  .state { text-align: center; padding: 60px 0; opacity: 0; animation: fadeUp 0.5s ease forwards; }
  .state-icon { font-size: 32px; margin-bottom: 16px; }
  .state-title { font-size: 22px; font-weight: 300; font-style: italic; color: var(--text); margin-bottom: 8px; }
  .state-sub { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--muted); }

  .spinner { display: none; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 60px auto; }
  .spinner.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results header */
  .results-header { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .results-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Cards */
  .feed { display: flex; flex-direction: column; gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 28px; position: relative; overflow: hidden; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards; transition: border-color 0.3s, transform 0.3s; }
  .card:hover { border-color: rgba(124,106,255,0.3); transform: translateY(-2px); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(124,106,255,0.4), transparent); opacity: 0; transition: opacity 0.3s; }
  .card:hover::before { opacity: 1; }
  .card-to { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-to::before { content: '✦'; font-size: 8px; opacity: 0.6; }
  .card-message { font-size: clamp(20px, 3.5vw, 26px); font-weight: 300; font-style: italic; line-height: 1.5; color: var(--text); margin-bottom: 24px; letter-spacing: 0.01em; }
  .card-song { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface2); border-radius: 2px; border: 1px solid var(--border); text-decoration: none; transition: border-color 0.2s; }
  .card-song:hover { border-color: rgba(124,106,255,0.3); }
  .song-art { width: 44px; height: 44px; border-radius: 2px; object-fit: cover; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-artist { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .spotify-dot { color: #1DB954; font-size: 16px; flex-shrink: 0; opacity: 0.8; }
  .card-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 16px; opacity: 0.6; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  
  /* Audio preview */
  .song-art-wrap { position: relative; flex-shrink: 0; width: 44px; height: 44px; }
  .song-art-wrap .song-art { width: 100%; height: 100%; }
  .play-btn {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); border-radius: 2px;
    opacity: 0; transition: opacity 0.2s;
    cursor: pointer; border: none;
  }
  .song-art-wrap:hover .play-btn { opacity: 1; }
  .play-btn svg { width: 18px; height: 18px; fill: #fff; }
  .play-btn.playing { opacity: 1; background: rgba(124,106,255,0.7); }
  .play-btn.no-preview { display: none; }

  /* Waveform animation when playing */
  @keyframes wave { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }
  .wave-bars { display: flex; align-items: center; gap: 2px; }
  .wave-bars span { display: block; width: 3px; height: 14px; background: #fff; border-radius: 2px; animation: wave 0.8s ease-in-out infinite; }
  .wave-bars span:nth-child(2) { animation-delay: 0.15s; }
  .wave-bars span:nth-child(3) { animation-delay: 0.3s; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(5,5,15,0.85); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal {
    background: #0c0c1e; border: 1px solid rgba(124,106,255,0.3);
    border-radius: 6px; padding: 40px; max-width: 520px; width: 100%;
    position: relative; transform: translateY(20px);
    transition: transform 0.3s;
  }
  .modal-overlay.visible .modal { transform: translateY(0); }
  @media (max-width: 600px) { .modal { padding: 28px 20px; margin: 0 8px; } .modal-message { font-size: 20px; } }
  .modal-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 18px;
    cursor: pointer; transition: color 0.2s; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-to { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .modal-to::before { content: '✦'; font-size: 8px; opacity: 0.6; }
  .modal-message { font-size: clamp(22px, 4vw, 30px); font-weight: 300; font-style: italic; line-height: 1.5; color: var(--text); margin-bottom: 28px; }
  .modal-song { display: flex; align-items: center; gap: 14px; padding: 16px; background: #10102a; border-radius: 2px; border: 1px solid rgba(255,255,255,0.07); text-decoration: none; transition: border-color 0.2s; }
  .modal-song:hover { border-color: rgba(124,106,255,0.3); }
  .modal-song-art-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
  .modal-song-art { width: 100%; height: 100%; border-radius: 2px; object-fit: cover; background: linear-gradient(135deg,#7c6aff,#c084fc); }
  .modal-play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); border-radius: 2px; opacity: 0; transition: opacity 0.2s; cursor: pointer; border: none; }
  .modal-song-art-wrap:hover .modal-play-btn { opacity: 1; }
  .modal-play-btn svg { width: 20px; height: 20px; fill: #fff; }
  .modal-play-btn.playing { opacity: 1; background: rgba(124,106,255,0.7); }
  .modal-play-btn.no-preview { display: none; }
  .modal-song-info { flex: 1; min-width: 0; }
  .modal-song-title { font-family: 'Syne', sans-serif; font-size: 15px; color: var(--text); }
  .modal-song-artist { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .modal-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 20px; opacity: 0.6; }

  /* Mobile */
  @media (max-width: 600px) {
    nav { padding: 16px 20px; }
    .nav-links { gap: 16px; }
    .nav-links a { font-size: 10px; letter-spacing: 0.06em; }
    .logo { font-size: 15px; }
    .wrapper { padding: 120px 16px 80px; }
    .song-art-wrap { width: 40px !important; height: 40px !important; }
    .card-song { padding: 10px 12px; gap: 10px; }
    .card-message { font-size: 18px; }
    .submit-bar { padding: 16px 20px; }
  }

  @media (max-width: 480px) {
    .nav-links { gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-links a { font-size: 9px; }
    .logo { font-size: 14px; }
    .hero h1, .page-title { font-size: 36px; }
    .card-song { flex-wrap: nowrap; }
    .song-art, .song-art-wrap { width: 36px !important; height: 36px !important; min-width: 36px; }
  }

  @media (max-width: 600px) {
    .search-row { flex-direction: column; gap: 10px; }
    .search-btn { padding: 14px; width: 100%; }
    .search-input { width: 100%; }
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<nav>
  <a href="/" class="logo">song<span>fess</span></a>
  <ul class="nav-links">
    <li><a href="/browse" class="active">browse</a></li>
    <li><a href="/confess">confess</a></li>
    <li><a href="/contact">contact</a></li>
    <li><a href="/about">about</a></li>
  </ul>
</nav>

<div class="wrapper">
  <p class="page-eyebrow">✦ &nbsp; someone out there is thinking of you</p>
  <h1 class="page-title">is there something<br>waiting for <em>you?</em></h1>
  <p class="page-sub">enter a name to find confessions sent to them.</p>

  <div class="search-row">
    <input type="text" class="search-input" id="nameInput" placeholder="enter a name..." autocomplete="off" maxlength="50">
    <button class="search-btn" onclick="search()">look up ✦</button>
  </div>

  <div class="spinner" id="spinner"></div>
  <div id="results"></div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--op:${Math.random()*0.6+0.1};--dur:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;`;
    starsEl.appendChild(s);
  }

  document.getElementById('nameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') search();
  });

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    const hrs = Math.floor(mins / 60);
    const days = Math.floor(hrs / 24);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    if (hrs < 24) return `${hrs}h ago`;
    if (days < 7) return `${days}d ago`;
    return new Date(dateStr).toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  async function search() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) return;

    const spinner = document.getElementById('spinner');
    const results = document.getElementById('results');
    spinner.classList.add('visible');
    results.innerHTML = '';

    try {
      const res = await fetch(`/api/confessions/search?name=${encodeURIComponent(name)}`);
      const data = await res.json();
      spinner.classList.remove('visible');

      if (!data.data || data.data.length === 0) {
        results.innerHTML = `
          <div class="state">
            <div class="state-icon">🌌</div>
            <div class="state-title">nothing found for "${name}"</div>
            <div class="state-sub">the void is quiet here... for now</div>
          </div>`;
        return;
      }

      const header = document.createElement('div');
      header.className = 'results-header';
      header.textContent = `${data.data.length} confession${data.data.length !== 1 ? 's' : ''} for ${name}`;
      results.appendChild(header);

      const feed = document.createElement('div');
      feed.className = 'feed';

      data.data.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'card'; card.style.cursor = 'pointer'; card.onclick = () => openModal(c);
        card.style.animationDelay = `${i * 0.08}s`;
        card.innerHTML = `
          <div class="card-to">to: ${c.recipient}</div>
          <div class="card-message">${c.message}</div>
          <a class="card-song" href="${c.spotify_url || '#'}" target="_blank" rel="noopener">
            <div class="song-art-wrap">
            <img class="song-art" src="${c.song_cover || ''}" alt="" onerror="this.style.background='linear-gradient(135deg,#7c6aff,#c084fc)'">
            <button class="play-btn ${c.preview_url ? '' : 'no-preview'}" onclick="togglePreview(event, '${c.preview_url || ''}', this)" title="play preview">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
            <div class="song-info">
              <div class="song-title">${c.song_title}</div>
              <div class="song-artist">${c.song_artist}</div>
            </div>
            <div class="spotify-dot">●</div>
          </a>
          <div class="card-time">${timeAgo(c.created_at)}</div>
        `;
        feed.appendChild(card);
      });

      results.appendChild(feed);
    } catch (err) {
      spinner.classList.remove('visible');
      results.innerHTML = `<div class="state"><div class="state-title">something went wrong</div><div class="state-sub">try again in a moment</div></div>`;
    }
  }

  // Audio preview
  let currentAudio = null;
  let currentBtn = null;

  function togglePreview(e, url, btn) {
    e.preventDefault();
    e.stopPropagation();
    if (!url) return;

    // Stop current if same
    if (currentAudio && currentBtn === btn) {
      currentAudio.pause();
      currentAudio = null;
      btn.classList.remove('playing');
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
      currentBtn = null;
      return;
    }

    // Stop any other playing
    if (currentAudio) {
      currentAudio.pause();
      currentBtn.classList.remove('playing');
      currentBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    }

    const audio = new Audio(url);
    audio.volume = 0.7;
    audio.play();
    currentAudio = audio;
    currentBtn = btn;
    btn.classList.add('playing');
    btn.innerHTML = '<div class="wave-bars"><span></span><span></span><span></span></div>';

    audio.onended = () => {
      btn.classList.remove('playing');
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
      currentAudio = null;
      currentBtn = null;
    };
  }

  // Modal
  let modalPreviewUrl = null;

  function openModal(c) {
    document.getElementById('modalTo').textContent = 'to: ' + c.recipient;
    document.getElementById('modalMessage').textContent = c.message;
    document.getElementById('modalArt').src = c.song_cover || '';
    document.getElementById('modalSongTitle').textContent = c.song_title;
    document.getElementById('modalSongArtist').textContent = c.song_artist;
    document.getElementById('modalSong').href = c.spotify_url || '#';
    document.getElementById('modalTime').textContent = timeAgo(c.created_at);
    modalPreviewUrl = c.preview_url || null;
    const playBtn = document.getElementById('modalPlayBtn');
    playBtn.classList.toggle('no-preview', !modalPreviewUrl);
    playBtn.classList.remove('playing');
    playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    document.getElementById('modalOverlay').classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closeModalDirect() {
    stopModalAudio();
    document.getElementById('modalOverlay').classList.remove('visible');
    document.body.style.overflow = '';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }

  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModalDirect(); });

  let modalAudio = null;
  function toggleModalPreview(e) {
    e.preventDefault(); e.stopPropagation();
    if (!modalPreviewUrl) return;
    const btn = document.getElementById('modalPlayBtn');
    if (modalAudio && !modalAudio.paused) {
      stopModalAudio();
      return;
    }
    if (currentAudio) { currentAudio.pause(); currentBtn && (currentBtn.classList.remove('playing'), currentBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'); }
    modalAudio = new Audio(modalPreviewUrl);
    modalAudio.volume = 0.7;
    modalAudio.play();
    btn.classList.add('playing');
    btn.innerHTML = '<div class="wave-bars"><span></span><span></span><span></span></div>';
    modalAudio.onended = () => { btn.classList.remove('playing'); btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; modalAudio = null; };
  }

  function stopModalAudio() {
    if (modalAudio) { modalAudio.pause(); modalAudio = null; }
    const btn = document.getElementById('modalPlayBtn');
    btn.classList.remove('playing');
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  }
</script>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div class="modal-to" id="modalTo"></div>
    <div class="modal-message" id="modalMessage"></div>
    <a class="modal-song" id="modalSong" href="#" target="_blank" rel="noopener">
      <div class="modal-song-art-wrap">
        <img class="modal-song-art" id="modalArt" src="" alt="">
        <button class="modal-play-btn" id="modalPlayBtn" onclick="toggleModalPreview(event)">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
      <div class="modal-song-info">
        <div class="modal-song-title" id="modalSongTitle"></div>
        <div class="modal-song-artist" id="modalSongArtist"></div>
      </div>
      <div class="spotify-dot">●</div>
    </a>
    <div class="modal-time" id="modalTime"></div>
  </div>
</div>
</body>
</html>
